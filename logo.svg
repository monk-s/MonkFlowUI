<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="200" height="220">
  <!-- Hexagon background -->
  <polygon points="100,10 185,52 185,148 100,190 15,148 15,52" fill="#0f1b2d" stroke="none"/>

  <!-- Subtle lower M reflection lines -->
  <polyline points="45,148 65,125 85,148 100,130 115,148 135,125 155,148" fill="none" stroke="#1a3a4a" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Hexagon outline (subtle) -->
  <polygon points="100,10 185,52 185,148 100,190 15,148 15,52" fill="none" stroke="#2a5a5a" stroke-width="1" opacity="0.4"/>

  <!-- Main crown/M shape -->
  <polyline points="45,135 65,80 100,110 135,80 155,135" fill="none" stroke="#00cc6a" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Crown top line -->
  <polyline points="65,80 100,55 135,80" fill="none" stroke="#00cc6a" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Node circles on crown -->
  <circle cx="45" cy="135" r="5" fill="#00cc6a"/>
  <circle cx="65" cy="80" r="5" fill="#00cc6a"/>
  <circle cx="100" cy="55" r="6" fill="#00cc6a"/>
  <circle cx="135" cy="80" r="5" fill="#00cc6a"/>
  <circle cx="155" cy="135" r="5" fill="#00cc6a"/>
  <circle cx="100" cy="110" r="5" fill="#00cc6a"/>

  <!-- Corner nodes on hexagon -->
  <circle cx="100" cy="10" r="3" fill="#2a8a6a" opacity="0.5"/>
  <circle cx="185" cy="52" r="3" fill="#2a8a6a" opacity="0.5"/>
  <circle cx="185" cy="148" r="3" fill="#2a8a6a" opacity="0.5"/>
  <circle cx="100" cy="190" r="3" fill="#2a8a6a" opacity="0.5"/>
  <circle cx="15" cy="148" r="3" fill="#2a8a6a" opacity="0.5"/>
  <circle cx="15" cy="52" r="3" fill="#2a8a6a" opacity="0.5"/>
</svg>